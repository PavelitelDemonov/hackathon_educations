<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завозик - Вход и регистрация</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-card" aria-live="polite">
            <a class="back-link" href="../no_registereusr/no_registeredusr.html">← Назад к курсам</a>

            <div class="auth-mode-switch" role="tablist" aria-label="Режим авторизации">
                <button class="mode-btn is-active" id="tab-login" type="button" role="tab" aria-selected="true" aria-controls="panel-login" data-mode="login">
                    Вход
                </button>
                <button class="mode-btn" id="tab-register" type="button" role="tab" aria-selected="false" aria-controls="panel-register" data-mode="register">
                    Регистрация
                </button>
            </div>

            <form id="panel-login" class="auth-form is-active" data-panel="login" autocomplete="on">
                <h1 class="auth-title">Вход в аккаунт</h1>

                <label class="field-label" for="login-email">Электронная почта</label>
                <input class="field-input" id="login-email" name="email" type="email" placeholder="example@mail.ru" required>

                <label class="field-label" for="login-password">Пароль</label>
                <input class="field-input" id="login-password" name="password" type="password" placeholder="Введите пароль" required>

                <a class="helper-link" href="#" id="forgot-password-link">Забыли пароль?</a>

                <p class="status-message is-error" id="login-message" role="alert"></p>

                <button class="submit-btn" type="submit">Вход</button>

                <p class="switch-text">
                    Нет аккаунта?
                    <button class="inline-switch-btn" type="button" data-mode="register">Создать аккаунт</button>
                </p>
            </form>

            <form id="panel-register" class="auth-form" data-panel="register" autocomplete="on">
                <h1 class="auth-title">Создание аккаунта</h1>

                <label class="field-label" for="register-nickname">Никнейм</label>
                <input class="field-input" id="register-nickname" name="nickname" type="text" minlength="3" maxlength="25" placeholder="Твой ник" required>

                <label class="field-label" for="register-email">Электронная почта</label>
                <input class="field-input" id="register-email" name="email" type="email" placeholder="example@mail.ru" required>

                <label class="field-label" for="register-password">Пароль</label>
                <input class="field-input" id="register-password" name="password" type="password" minlength="6" placeholder="Не менее 6 символов" required>

                <label class="field-label" for="register-password-repeat">Подтверждение пароля</label>
                <input class="field-input" id="register-password-repeat" name="passwordRepeat" type="password" minlength="6" placeholder="Повтори пароль" required>

                <p class="status-message" id="register-message" role="alert"></p>

                <button class="submit-btn" type="submit">Создать аккаунт</button>

                <p class="switch-text">
                    Уже есть аккаунт?
                    <button class="inline-switch-btn" type="button" data-mode="login">Войти</button>
                </p>
            </form>
        </section>
    </main>

    <script src="login_script.js"></script>
</body>
</html>
